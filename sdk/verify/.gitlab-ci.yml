# GitLab CI/CD for aigentsy-verify PyPI publishing
# Uses Trusted Publishing (OIDC) when configured on PyPI/TestPyPI.
# Manual fallback: set TWINE_USERNAME + TWINE_PASSWORD in CI/CD variables.
#
# Flow: test → build → publish-testpypi → publish-pypi
#   - test + build run on every push
#   - publish-testpypi runs on tags matching v*
#   - publish-pypi runs on tags matching v* (manual trigger)

stages:
  - test
  - build
  - publish

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

.python-setup: &python-setup
  image: python:3.12-slim
  cache:
    paths:
      - .pip-cache/

test:
  <<: *python-setup
  stage: test
  script:
    - cd sdk/verify
    - pip install -e ".[test]"
    - python -m pytest tests/ -v
  rules:
    - changes:
        - sdk/verify/**/*

build:
  <<: *python-setup
  stage: build
  script:
    - pip install build
    - cd sdk/verify
    - python -m build
    - ls -la dist/
  artifacts:
    paths:
      - sdk/verify/dist/
    expire_in: 1 week
  rules:
    - changes:
        - sdk/verify/**/*

publish-testpypi:
  <<: *python-setup
  stage: publish
  dependencies:
    - build
  script:
    - pip install twine
    - >
      TWINE_USERNAME=${TESTPYPI_USERNAME:-__token__}
      TWINE_PASSWORD=${TESTPYPI_TOKEN}
      python -m twine upload
      --repository-url https://test.pypi.org/legacy/
      sdk/verify/dist/*
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  environment:
    name: testpypi
    url: https://test.pypi.org/project/aigentsy-verify/

publish-pypi:
  <<: *python-setup
  stage: publish
  dependencies:
    - build
  script:
    - pip install twine
    - >
      TWINE_USERNAME=${PYPI_USERNAME:-__token__}
      TWINE_PASSWORD=${PYPI_TOKEN}
      python -m twine upload sdk/verify/dist/*
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
      when: manual
  environment:
    name: pypi
    url: https://pypi.org/project/aigentsy-verify/
